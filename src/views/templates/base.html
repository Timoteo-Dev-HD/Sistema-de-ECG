<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema ECG{% endblock %}</title>

    <!-- CSS Global -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">

    {% block css %}{% endblock %}
</head>
<body>

{% if session.get("user_id") %}
<header class="main-header">
    <div class="header-left">
        <h2>Sistema ECG - HDInfo</h2>

        <nav>
            <a href="{{ url_for('web.home') }}">Home</a>
            <a href="{{ url_for('web.listar_pacientes') }}">Pacientes</a>
        </nav>
    </div>

    <div class="header-right">
        <span class="user-name">
            {{ session.get("user_nome") }}
        </span>
        <a href="{{ url_for('web.logout') }}" class="btn-logout">Sair</a>
    </div>
</header>
{% endif %}

<main class="container">
    {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}

</body>
</html>
